name: Validate translations

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate translations
        run: node scripts/check-translations.mjs
      - name: Check hreflang sync
        run: node scripts/sync-hreflang.mjs --check
        continue-on-error: true
      - name: Check OG image freshness
        run: |
          sudo apt-get update && sudo apt-get install -y librsvg2-bin
          node scripts/build-og-images.mjs --check
        continue-on-error: true
